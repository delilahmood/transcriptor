
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranscritVite - Version Ultra Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; min-height: 100vh; }
        .arabic-text { font-family: 'Noto Sans Arabic', sans-serif; direction: rtl; text-align: right; }
        .recording-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #6366f1; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
        <!-- Header -->
        <div class="bg-slate-900 p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-600 rounded-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black uppercase tracking-tight">TranscritVite</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Écouteur Vocal</span>
                        <label class="switch">
                            <input type="checkbox" id="voice-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-slate-800 p-1.5 rounded-2xl border border-slate-700">
                <button id="btn-fr" onclick="changeLanguage('fr-FR')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white shadow-lg">FR</button>
                <button id="btn-ar" onclick="changeLanguage('ar-SA')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all text-slate-400">AR</button>
            </div>
        </div>

        <!-- Status -->
        <div class="bg-slate-50 px-8 py-3 border-b flex justify-between items-center text-[10px] font-black uppercase text-slate-500 tracking-tighter">
            <div class="flex items-center gap-2">
                <span id="status-dot" class="h-2 w-2 rounded-full bg-slate-300"></span>
                <span id="status-text">Système Prêt</span>
                <span id="listening-indicator" class="hidden px-2 py-0.5 bg-indigo-100 text-indigo-600 rounded">Micro Ouvert</span>
            </div>
            <div id="timer" class="font-mono text-indigo-600 bg-white px-3 py-1 rounded-lg border shadow-sm">00:00</div>
        </div>

        <!-- Editor -->
        <div class="p-6">
            <textarea id="transcript-output" 
                class="w-full h-[300px] p-6 text-slate-800 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 transition-all outline-none resize-none text-xl rounded-[2rem] shadow-inner font-medium"
                placeholder="Cliquez sur 'Démarrer' pour commencer..."></textarea>
            
            <div class="mt-6 space-y-4">
                <div class="flex gap-4">
                    <button id="start-btn" class="flex-1 py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-3xl shadow-xl transition-all active:scale-95">DÉMARRER</button>
                    <button id="stop-btn" class="hidden flex-1 py-5 bg-red-500 hover:bg-red-600 text-white font-black rounded-3xl shadow-xl recording-pulse active:scale-95 transition-all">STOP</button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button id="whatsapp-btn" class="py-4 bg-[#25D366] text-white font-bold rounded-2xl shadow-md hover:brightness-105 transition-all">WhatsApp</button>
                    <button id="clear-btn" class="py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition-all">Effacer</button>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full text-xs font-bold opacity-0 transition-all pointer-events-none z-50 shadow-lg"></div>

    <script>
        let currentLang = 'fr-FR';
        let isRecording = false; 
        let isVoiceControlEnabled = false; 
        let recognition = null;
        let timerInterval;
        let lastRestartTime = 0;
        let stopRequested = false;

        const output = document.getElementById('transcript-output');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const voiceToggle = document.getElementById('voice-toggle');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const timerDisplay = document.getElementById('timer');
        const toast = document.getElementById('toast');

        const CMD = {
            START: ["démarrer", "abda", "ibda", "tasjal", "commence"],
            STOP: ["stop", "arrête", "baraka", "waqaf", "finir"],
            AR: ["arabe", "arabi", "arabiya"],
            FR: ["français", "france", "fransi", "fransiya"]
        };

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        function initRecognition() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) {
                showToast("Navigateur incompatible");
                return null;
            }
            
            if (recognition) {
                try { recognition.abort(); } catch(e) {}
            }

            const rec = new Speech();
            rec.lang = currentLang;
            rec.continuous = true;
            rec.interimResults = true;

            rec.onstart = () => {
                console.log("Micro démarré");
                statusDot.classList.add('bg-green-500');
            };

            rec.onresult = (e) => {
                let interimTranscript = '';
                for (let i = e.resultIndex; i < e.results.length; ++i) {
                    const result = e.results[i][0].transcript.toLowerCase().trim();
                    
                    // Priorité aux commandes vocales si activées
                    if (isVoiceControlEnabled) {
                        if (CMD.STOP.some(k => result.includes(k))) { handleStop(); return; }
                        if (CMD.AR.some(k => result.includes(k))) { changeLanguage('ar-SA'); return; }
                        if (CMD.FR.some(k => result.includes(k))) { changeLanguage('fr-FR'); return; }
                        if (CMD.START.some(k => result.includes(k))) { handleStart(); return; }
                    }

                    if (isRecording) {
                        if (e.results[i].isFinal) {
                            const val = e.results[i][0].transcript.trim();
                            // On vérifie que ce n'est pas une commande
                            const isCmd = [...CMD.START, ...CMD.STOP, ...CMD.AR, ...CMD.FR].some(k => result.includes(k));
                            if (!isCmd) {
                                output.value += (output.value ? ' ' : '') + val + (currentLang === 'fr-FR' ? '.' : '');
                                output.scrollTop = output.scrollHeight;
                            }
                        }
                    }
                }
            };

            rec.onend = () => {
                console.log("Session terminée");
                if (!stopRequested && (isVoiceControlEnabled || isRecording)) {
                    const now = Date.now();
                    if (now - lastRestartTime > 1500) {
                        lastRestartTime = now;
                        setTimeout(() => {
                            try { rec.start(); } catch(err) {}
                        }, 300);
                    }
                }
            };

            rec.onerror = (e) => {
                console.error("Erreur Speech:", e.error);
                if (e.error === 'not-allowed') showToast("Micro bloqué");
            };

            return rec;
        }

        function handleStart() {
            if (isRecording) return;
            stopRequested = false;
            isRecording = true;
            
            if (!recognition) recognition = initRecognition();
            
            try { 
                recognition.start();
                startTimer();
                updateUI();
                showToast("Écoute...");
            } catch(e) {
                // Déjà démarré ou erreur
                updateUI();
            }
        }

        function handleStop() {
            isRecording = false;
            stopRequested = true;
            stopTimer();
            updateUI();
            
            if (!isVoiceControlEnabled && recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            showToast("Arrêté");
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const isAr = lang.startsWith('ar');
            document.getElementById('btn-fr').className = lang === 'fr-FR' ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white shadow-lg' : 'px-5 py-2 rounded-xl text-xs font-bold text-slate-400';
            document.getElementById('btn-ar').className = isAr ? 'px-5 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 text-white shadow-lg' : 'px-5 py-2 rounded-xl text-xs font-bold text-slate-400';
            output.className = isAr ? "arabic-text w-full h-[300px] p-6 text-slate-800 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 transition-all outline-none resize-none text-xl rounded-[2rem] shadow-inner font-medium" : "w-full h-[300px] p-6 text-slate-800 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 transition-all outline-none resize-none text-xl rounded-[2rem] shadow-inner font-medium";
            
            if (recognition) {
                recognition.lang = lang;
                stopRequested = false;
                try { recognition.stop(); } catch(e) {}
            }
            showToast(isAr ? "Arabe" : "Français");
        }

        voiceToggle.onchange = (e) => {
            isVoiceControlEnabled = e.target.checked;
            document.getElementById('listening-indicator').classList.toggle('hidden', !isVoiceControlEnabled);
            
            if (isVoiceControlEnabled) {
                stopRequested = false;
                if (!recognition) recognition = initRecognition();
                try { recognition.start(); } catch(err) {}
                showToast("Contrôle vocal ON");
            } else {
                if (!isRecording) {
                    stopRequested = true;
                    try { recognition.stop(); } catch(e) {}
                }
                showToast("Contrôle vocal OFF");
            }
            updateUI();
        };

        function updateUI() {
            startBtn.classList.toggle('hidden', isRecording);
            stopBtn.classList.toggle('hidden', !isRecording);
            statusDot.className = isRecording ? 'h-2 w-2 rounded-full bg-red-500' : (isVoiceControlEnabled ? 'h-2 w-2 rounded-full bg-green-500' : 'h-2 w-2 rounded-full bg-slate-300');
            statusText.innerText = isRecording ? 'Enregistrement' : (isVoiceControlEnabled ? 'Veille Vocale' : 'Prêt');
        }

        function startTimer() {
            let s = 0;
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                s++;
                const m = Math.floor(s/60).toString().padStart(2,'0');
                const sec = (s%60).toString().padStart(2,'0');
                timerDisplay.innerText = `${m}:${sec}`;
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

        startBtn.onclick = handleStart;
        stopBtn.onclick = handleStop;
        document.getElementById('clear-btn').onclick = () => { if(confirm("Effacer ?")) { output.value = ""; timerDisplay.innerText = "00:00"; } };
        document.getElementById('whatsapp-btn').onclick = () => {
            if(!output.value) return showToast("Texte vide");
            window.open("https://wa.me/?text=" + encodeURIComponent(output.value), '_blank');
        };

        // Initialisation propre
        window.onload = () => { recognition = initRecognition(); };
    </script>
</body>
</html>
